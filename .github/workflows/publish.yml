name: Production Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo with full history
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2️⃣ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      # 3️⃣ Install deps
      - name: Install
        run: npm install

      # 4️⃣ Run tests (safe fallback)
      - name: Test
        run: npm test || echo "No tests"

      # 5️⃣ Configure Git
      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      # 6️⃣ Get current version
      - name: Get current version
        id: current_version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      # 7️⃣ Bump version ONLY for real commits (not bot commits)
      - name: Bump version
        if: "!contains(github.event.head_commit.message, 'ci: release')"
        run: npm version patch -m "ci: release %s"

      # 8️⃣ Push version back
      - name: Push changes
        if: "!contains(github.event.head_commit.message, 'ci: release')"
        run: git push origin main --follow-tags

      # 9️⃣ Get new version
      - name: Get new version
        id: new_version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      # 🔟 Prevent duplicate publish
      - name: Check if version exists on npm
        id: check_version
        run: |
          npm view @investorphem/string-tools@${{ steps.new_version.outputs.version }} version || echo "not_found=true" >> $GITHUB_OUTPUT

      # 1️⃣1️⃣ Publish ONLY if version is new
      - name: Publish to npm
        if: steps.check_version.outputs.not_found == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}